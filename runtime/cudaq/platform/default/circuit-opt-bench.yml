name: circuit-opt-bench
description: "CZ-basis decomposition with optional SABRE routing for compiler benchmarking"

target-arguments:
  - key: device
    required: false
    type: string
    help-string: "Device topology for SABRE routing (e.g., path(5), grid(3,3), file(/path/to/topo.txt)). Defaults to bypass (no routing)."

config:
  nvqir-simulation-backend: qpp
  # Synthesize registered custom unitaries so Benchpress QV SU(4) blocks lower
  # to explicit gates before decomposition and routing.
  jit-high-level-pipeline: "get-concrete-matrix,unitary-synthesis"
  # Decompose to CX basis, route via SABRE, then convert CX to CZ to match
  # the Benchpress target basis {id, sx, x, rz, cz}.
  # %DEVICE:bypass% defaults to bypass (no routing) when device is not set.
  # Post-routing decomposition converts router-inserted SWAPs and remaining
  # CX gates to CZ as the final 2Q gate.
  # Inline KAK-decomposed helper functions before decomposition and routing
  # so the router sees the individual CX gates, not opaque quake.apply ops.
  jit-mid-level-pipeline: "apply-op-specialization,aggressive-inlining,decomposition{basis=h,rx,ry,rz,x,x(1)},func.func(add-dealloc,combine-quantum-alloc,canonicalize,factor-quantum-alloc,memtoreg),add-wireset,func.func(assign-wire-indices),qubit-mapping{device=%DEVICE:bypass%},func.func(delay-measurements,regtomem),decomposition{basis=h,rx,ry,rz,x,z(1)}"
  # Cleanup: symbol-dce removes wire_set ops left by add-wireset (prevents
  # the JIT from taking the wireset-to-profile QIR path).
  jit-low-level-pipeline: "func.func(apply-control-negations,canonicalize,cse),symbol-dce"
  library-mode: false
