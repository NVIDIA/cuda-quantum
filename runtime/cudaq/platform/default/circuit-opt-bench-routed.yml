name: circuit-opt-bench-routed
description: "CX-basis decomposition with SABRE routing for compiler benchmarking"

target-arguments:
  - key: device
    required: true
    type: string
    help-string: "Device topology for SABRE routing (e.g., path(5), grid(3,3), file(/path/to/topo.txt))"

config:
  nvqir-simulation-backend: qpp
  # Synthesis (same as circuit-opt-bench).
  jit-high-level-pipeline: "func.func(cc-loop-normalize,cc-loop-unroll,canonicalize,lift-array-alloc),globalize-array-values,func.func(canonicalize),get-concrete-matrix,unitary-synthesis"
  # Decompose to CX basis, then route via SABRE on the target topology.
  # %DEVICE% is substituted at runtime from cudaq.set_target() kwargs.
  # Post-routing SwapToCX decomposes router-inserted SWAPs into 3 CX each.
  jit-mid-level-pipeline: "func.func(multicontrol-decomposition),decomposition{enable-patterns=SToR1,TToR1,R1ToU3,U3ToRotations,CHToCX,CCZToCX,CRzToCX,CRyToCX,CRxToCX,CR1ToCX,RxAdjToRx,RyAdjToRy,RzAdjToRz,R1AdjToR1,SwapToCX,ExpPauliDecomposition},func.func(add-dealloc,combine-quantum-alloc,canonicalize,factor-quantum-alloc,memtoreg),add-wireset,func.func(assign-wire-indices),qubit-mapping{device=%DEVICE%},func.func(delay-measurements,regtomem),decomposition{enable-patterns=SwapToCX}"
  # Cleanup: remove wire_set ops left by add-wireset (prevents JIT from
  # taking the wireset-to-profile QIR path, which does not support full QIR).
  jit-low-level-pipeline: "func.func(apply-control-negations,canonicalize,cse),symbol-dce"
  library-mode: false
