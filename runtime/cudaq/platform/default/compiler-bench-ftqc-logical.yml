name: compiler-bench-ftqc-logical
description: "Logical FTQC benchmark target lowering to a pre-synthesis Clifford+T and rotation basis for resource counting"

config:
  nvqir-simulation-backend: qpp
  # Target mid-level stage: enforce the logical basis while the circuit uses
  # memory semantics, then enter value semantics once for local gate
  # simplification. The basis preserves T-family gates and unresolved
  # single-qubit rotations for layer-one FTQC metrics.
  jit-mid-level-pipeline: "decomposition{basis=h,s,t,rx,ry,rz,x,y,z,x(1),y(1),z(1),x(2),z(2)},func.func(add-dealloc,combine-quantum-alloc,canonicalize,dqe,memtoreg,quake-simplify,canonicalize,dqe,regtomem)"
  
