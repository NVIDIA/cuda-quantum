name: remote-mqpu
description:
  "The remote-mqpu target provides MPI-based CUDA-Q multi-QPU simulator runtime services."

config:
  gen-target-backend: true
  platform-library: mqpu
  preprocessor-defines: []
  link-libs: []
  library-mode: false

target-arguments:
  - key: backend
    required: false
    type: string
    platform-arg: backend 
    help-string: "Specify the remote simulator backend."
  - key: nqpus
    required: false
    type: integer
    platform-arg: nqpus
    help-string: "Specify the number of QPU instances."
