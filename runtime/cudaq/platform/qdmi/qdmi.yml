name: qdmi
description: "CUDA-Q target for QDMI devices."
config:
  platform-library: qdmi
  gen-target-backend: true
  preprocessor-defines: ["-D CUDAQ_QUANTUM_DEVICE"]
  jit-mid-level-pipeline: "lower-to-cfg,func.func(canonicalize,multicontrol-decomposition),qdmi-gate-set-mapping{basis=%qdmi_basis%},func.func(add-dealloc,combine-quantum-alloc,canonicalize,factor-quantum-alloc,dqe,memtoreg),add-wireset,func.func(assign-wire-indices),qubit-mapping{device=%qdmi_connectivity%},func.func(delay-measurements,regtomem),qdmi-gate-set-mapping{basis=%qdmi_basis%},func.func(expand-control-veqs,combine-quantum-alloc,canonicalize,combine-measurements)"

target-arguments:
  - key: library
    required: true
    type: string
    platform-arg: qdmi_library
    help-string: "Path to the QDMI device library."
  - key: prefix
    required: true
    type: string
    platform-arg: qdmi_prefix
    help-string: "QDMI function prefix used by the device library."
  - key: base-url
    required: false
    type: string
    platform-arg: qdmi_base_url
    help-string: "Device base URL."
  - key: token
    required: false
    type: string
    platform-arg: qdmi_token
    help-string: "Authentication token."
  - key: auth-file
    required: false
    type: string
    platform-arg: qdmi_auth_file
    help-string: "Authentication file."
  - key: auth-url
    required: false
    type: string
    platform-arg: qdmi_auth_url
    help-string: "Authentication URL."
  - key: username
    required: false
    type: string
    platform-arg: qdmi_username
    help-string: "Authentication username."
  - key: password
    required: false
    type: string
    platform-arg: qdmi_password
    help-string: "Authentication password."
  - key: session-custom1
    required: false
    type: string
    platform-arg: qdmi_session_custom1
    help-string: "Custom QDMI device session parameter 1."
  - key: session-custom2
    required: false
    type: string
    platform-arg: qdmi_session_custom2
    help-string: "Custom QDMI device session parameter 2."
  - key: session-custom3
    required: false
    type: string
    platform-arg: qdmi_session_custom3
    help-string: "Custom QDMI device session parameter 3."
  - key: session-custom4
    required: false
    type: string
    platform-arg: qdmi_session_custom4
    help-string: "Custom QDMI device session parameter 4."
  - key: session-custom5
    required: false
    type: string
    platform-arg: qdmi_session_custom5
    help-string: "Custom QDMI device session parameter 5."
  - key: job-custom1
    required: false
    type: string
    platform-arg: qdmi_job_custom1
    help-string: "Custom QDMI device job parameter 1."
  - key: job-custom2
    required: false
    type: string
    platform-arg: qdmi_job_custom2
    help-string: "Custom QDMI device job parameter 2."
  - key: job-custom3
    required: false
    type: string
    platform-arg: qdmi_job_custom3
    help-string: "Custom QDMI device job parameter 3."
  - key: job-custom4
    required: false
    type: string
    platform-arg: qdmi_job_custom4
    help-string: "Custom QDMI device job parameter 4."
  - key: job-custom5
    required: false
    type: string
    platform-arg: qdmi_job_custom5
    help-string: "Custom QDMI device job parameter 5."
