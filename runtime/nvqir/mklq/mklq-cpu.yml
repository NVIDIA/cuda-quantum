name: mklq-cpu
description: "MKL-Q Apple Silicon CPU target using the native fp64 state-vector simulator."
config:
  nvqir-simulation-backend: mklq_cpu
  preprocessor-defines: ["-D CUDAQ_SIMULATION_SCALAR_FP64", "-D MKLQ_APPLE_SILICON_CPU_BASELINE"]
