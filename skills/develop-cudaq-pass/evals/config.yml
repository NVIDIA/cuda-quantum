schema_version: 1

harbor:
  # Drive evaluation tasks from evals/evals.json.
  task_source: evals_json
  custom_dockerfile_mode: rebase
  base_image_mode: reuse
  n_attempts: 2
  pass_threshold: 0.60
  stop_on_pass: true
  n_concurrent: 4
  max_agents: 2
  timeout_multiplier: 2.0

skill_workspace:
  # Stage only this skill. Future source-editing qualification requires
  # sanitized repository staging; see EVAL.md.
  mode: isolated

grading:
  mode: default
