schema_version: 1

harbor:
  task_source: native_harbor
  custom_dockerfile_mode: preserve
  base_image_mode: disabled
  n_attempts: 1
  pass_threshold: 0.60
  stop_on_pass: false
  n_concurrent: 2
  max_agents: 2
  timeout_multiplier: 1.0
  agent_workdir: /workspace

skill_workspace:
  mode: isolated
  include: []

grading:
  mode: custom_only
