# Per-target execution test generation.
#
# Source templates (.cpp.inc) live in targettests/execution/.
# lit.cfg.py reads this file and generates one .cpp per (source, target)
# pair under targettests/generated/execution/.
#
# Each target entry has:
#   compile   - the nvq++ compile command
#   run       - one or more run commands (list)
#   requires  - (optional) lit feature; test is skipped when absent


tests:

  - source: bug_qubit.cpp.inc
    targets:
      - name: anyon
        compile: "nvq++ --target anyon --emulate %s -o %t"
        run: ["%t"]
      - name: infleqtion
        compile: "nvq++ --target infleqtion --emulate %s -o %t"
        run: ["%t"]
      - name: ionq
        compile: "nvq++ --target ionq --emulate %s -o %t"
        run: ["%t"]
      - name: iqm
        compile: "nvq++ --target iqm --emulate %s -o %t"
        run:
          - "IQM_QPU_QA=%iqm_tests_dir/Crystal_5.txt  %t"
          - "IQM_QPU_QA=%iqm_tests_dir/Crystal_20.txt %t"
          - "IQM_QPU_QA=%iqm_tests_dir/Crystal_54.txt %t"
      - name: oqc
        compile: "nvq++ --target oqc --emulate %s -o %t"
        run: ["%t"]
      - name: quantinuum
        compile: "nvq++ --target quantinuum --emulate %s -o %t"
        run: ["%t"]
      - name: braket
        requires: braket
        compile: "nvq++ --target braket --emulate %s -o %t"
        run: ["%t"]
      - name: qci
        requires: qci
        compile: "nvq++ --target qci --emulate %s -o %t"
        run: ["%t"]
    extra_runs:
      mlir:
        - "cudaq-quake %s | cudaq-opt --promote-qubit-allocation | FileCheck --check-prefixes=MLIR %s"

