on:
  workflow_call:
    inputs:
      platform:
        type: string
        required: false
        default: linux/amd64
      mpi:
        type: string
        required: false
        default: openmpi
      devdeps_image:
        required: false
        type: string
      devdeps_cache:
        required: true
        type: string
      devdeps_archive:
        required: true
        type: string
      export_environment:
        required: false
        type: boolean

name: Run CI within the dev environment container

jobs:
  build_and_test:
    name: Dev environment (Debug)
    runs-on: ${{ (contains(inputs.platform, 'arm') && 'linux-arm64-cpu8') || 'linux-amd64-cpu8' }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Restore environment
        id: restore_devdeps
        if: inputs.devdeps_image == ''
        uses: actions/cache/restore@v4
        with:
          path: ${{ inputs.devdeps_archive }}
          key: ${{ inputs.devdeps_cache }}
          fail-on-cache-miss: true

      - name: Log in to GitHub CR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up ccache and ORAS
        uses: ./.github/actions/ccache-setup

      - name: Compute platform ID
        id: platform_meta
        run: |
          platform_id=$(echo "${{ inputs.platform }}" | sed 's/linux\///g' | tr -d ' ')
          echo "platform_id=$platform_id" >> $GITHUB_OUTPUT

      - name: Restore ccache from GHCR
        uses: ./.github/actions/ccache-restore
        with:
          cache-key: ${{ steps.platform_meta.outputs.platform_id }}-devenv
          registry-token: ${{ github.token }}

      - name: Set up context for buildx
        run: |
          docker context create builder_context

      - name: Set up buildx runner
        uses: docker/setup-buildx-action@v3
        with:
          endpoint: builder_context
          version: v0.19.0
          buildkitd-config: /etc/buildkit/buildkitd.toml # hard-coded to run on our runners
          driver-opts: |
            image=moby/buildkit:v0.19.0

      - name: Setup proxy cache
        uses: nv-gha-runners/setup-proxy-cache@main
        with:
          enable-apt: false

      - name: Build CUDA Quantum
        id: build
        run: |
          if ${{ steps.restore_devdeps.outcome != 'skipped' }}; then
            load_output=`docker load --input "${{ inputs.devdeps_archive }}"`
            base_image=`echo "$load_output" | grep -o 'Loaded image: \S*:\S*' | head -1 | cut -d ' ' -f 3`
            docker push $base_image
            rm -rf "${{ inputs.devdeps_archive }}"
          elif ${{ inputs.devdeps_image != '' }}; then
            base_image=${{ inputs.devdeps_image }}
          else
            echo "::error file=test_in_devenv.yml::Missing configuration for development dependencies. Either specify the image (i.e. provide devdeps_image) or cache (i.e. provide devdeps_cache and devdeps_archive) that should be used for the build."
            exit 1
          fi

          echo "base_image=$base_image" >> $GITHUB_OUTPUT

          docker buildx build --platform ${{ inputs.platform }} \
            -f docker/build/cudaq.dev.Dockerfile . \
            --build-context ccache-data=/tmp/ccache-data \
            --build-arg base_image=$base_image \
            --build-arg install="CMAKE_BUILD_TYPE=Debug" \
            --build-arg mpi="${{ inputs.mpi }}" \
            --build-arg run_tests=true \
            --target devbuild

      - name: Test CUDA Quantum
        run: |
          docker buildx build --progress=plain --platform ${{ inputs.platform }} \
            -f docker/build/cudaq.dev.Dockerfile . \
            --build-context ccache-data=/tmp/ccache-data \
            --build-arg base_image=${{ steps.build.outputs.base_image }} \
            --build-arg install="CMAKE_BUILD_TYPE=Debug" \
            --build-arg mpi="${{ inputs.mpi }}" \
            --build-arg run_tests=true \
            --target test

      - name: Test CUDA Quantum MPI Plugin Activation
        run: |
          docker buildx build --progress=plain --platform ${{ inputs.platform }} \
            -f docker/build/cudaq.dev.Dockerfile . \
            --build-context ccache-data=/tmp/ccache-data \
            --build-arg base_image=${{ steps.build.outputs.base_image }} \
            --build-arg install="CMAKE_BUILD_TYPE=Debug" \
            --build-arg mpi="${{ inputs.mpi }}" \
            --build-arg run_tests=true \
            --target test-mpi

      - name: Extract ccache from build
        timeout-minutes: 15
        continue-on-error: true
        run: |
          mkdir -p /tmp/ccache-export
          docker buildx build \
            -f docker/build/cudaq.dev.Dockerfile . \
            --build-context ccache-data=/tmp/ccache-data \
            --build-arg base_image=${{ steps.build.outputs.base_image }} \
            --build-arg install="CMAKE_BUILD_TYPE=Debug" \
            --build-arg mpi="${{ inputs.mpi }}" \
            --target ccache-export \
            --output type=local,dest=/tmp/ccache-export \
            2>&1 | tail -20
          if [ -f /tmp/ccache-export/ccache.tar ]; then
            mkdir -p /tmp/ccache-export/ccache
            tar xf /tmp/ccache-export/ccache.tar -C /tmp/ccache-export/ccache
            rm -f /tmp/ccache-export/ccache.tar
          fi

      - name: Push ccache to GHCR
        uses: ./.github/actions/ccache-push
        with:
          cache-key: ${{ steps.platform_meta.outputs.platform_id }}-devenv
          cache-path: /tmp/ccache-export/ccache
          registry-token: ${{ github.token }}

      - name: Save environment
        id: env_save
        if: inputs.export_environment
        run: |
          output_directory=/tmp
          platform_id=`echo ${{ inputs.platform }} | sed 's/linux\///g' | tr -d ' '`
          filename=${platform_id}_debug_build

          # Export the image to Docker daemon only when needed.
          # Reuses the BuildKit cache so only the export runs.
          docker buildx build --platform ${{ inputs.platform }} \
            --load -t cuda-quantum-dev:local -f docker/build/cudaq.dev.Dockerfile . \
            --build-context ccache-data=/tmp/ccache-data \
            --build-arg base_image=${{ steps.build.outputs.base_image }} \
            --build-arg install="CMAKE_BUILD_TYPE=Debug" \
            --build-arg mpi="${{ inputs.mpi }}"

          docker run --name cuda-quantum-dev cuda-quantum-dev:local
          docker export cuda-quantum-dev > $output_directory/$filename.tar
          docker rm -f cuda-quantum-dev

          echo "filename=$filename" >> $GITHUB_OUTPUT
          echo "output_directory=$output_directory" >> $GITHUB_OUTPUT

      - name: Upload environment
        uses: actions/upload-artifact@v4
        if: inputs.export_environment
        with:
          name: ${{ steps.env_save.outputs.filename }}
          path: ${{ steps.env_save.outputs.output_directory }}/${{ steps.env_save.outputs.filename }}.tar
          retention-days: 1

  build_and_test_python:
    name: Dev environment (Python)
    runs-on: ${{ (contains(inputs.platform, 'arm') && 'linux-arm64-cpu8') || 'linux-amd64-cpu8' }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Restore environment
        id: restore_devdeps
        if: inputs.devdeps_image == ''
        uses: actions/cache/restore@v4
        with:
          path: ${{ inputs.devdeps_archive }}
          key: ${{ inputs.devdeps_cache }}
          fail-on-cache-miss: true

      - name: Log in to GitHub CR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up ccache and ORAS
        uses: ./.github/actions/ccache-setup

      - name: Compute platform ID
        id: platform_meta
        run: |
          platform_id=$(echo "${{ inputs.platform }}" | sed 's/linux\///g' | tr -d ' ')
          echo "platform_id=$platform_id" >> $GITHUB_OUTPUT

      - name: Restore ccache from GHCR
        uses: ./.github/actions/ccache-restore
        with:
          cache-key: ${{ steps.platform_meta.outputs.platform_id }}-devenv-python
          registry-token: ${{ github.token }}

      - name: Set up context for buildx
        run: |
          docker context create builder_context

      - name: Set up buildx runner
        uses: docker/setup-buildx-action@v3
        with:
          endpoint: builder_context
          version: v0.19.0
          buildkitd-config: /etc/buildkit/buildkitd.toml # hard-coded to run on our runners
          driver-opts: |
            image=moby/buildkit:v0.19.0

      - name: Setup proxy cache
        uses: nv-gha-runners/setup-proxy-cache@main
        with:
          enable-apt: false

      - name: Set up dev environment
        id: dev_env
        run: |
          if ${{ steps.restore_devdeps.outcome != 'skipped' }}; then
            load_output=`docker load --input "${{ inputs.devdeps_archive }}"`
            base_image=`echo "$load_output" | grep -o 'Loaded image: \S*:\S*' | head -1 | cut -d ' ' -f 3`
            docker push $base_image
            rm -rf "${{ inputs.devdeps_archive }}"
          elif ${{ inputs.devdeps_image != '' }}; then
            base_image=${{ inputs.devdeps_image }}
          else
            echo "::error file=test_in_devenv.yml::Missing configuration for development dependencies. Either specify the image (i.e. provide devdeps_image) or cache (i.e. provide devdeps_cache and devdeps_archive) that should be used for the build."
            exit 1
          fi

          docker buildx build --platform ${{ inputs.platform }} \
            --load -t dev_env:local -f docker/build/cudaq.dev.Dockerfile . \
            --build-context ccache-data=/tmp/ccache-data \
            --build-arg base_image=$base_image

      - name: Setup proxy cache
        uses: nv-gha-runners/setup-proxy-cache@main

      - name: Build and test CUDA Quantum (Python)
        uses: ./.github/actions/run-in-docker
        with:
          image: dev_env:local
          shell: bash
          run: |
            cd $CUDAQ_REPO_ROOT

            export DEBIAN_FRONTEND=noninteractive
            apt-get update -y && apt-get install -y python3-venv

            VENV_DIR="$HOME/.venvs/cudaq"
            python3 -m venv --system-site-packages "$VENV_DIR"
            . "$VENV_DIR/bin/activate"

            pip install -r requirements-tests-backend.txt
            pip install . -vvv
            pyinstall_status=$?
            if [ ! $pyinstall_status -eq 0 ]; then
              echo "::error file=test_in_devenv.yml:: Pip install of CUDA Quantum failed with status $pyinstall_status."
              exit 1
            fi

            python -m pip install pytest pytest-xdist
            python -m pytest -v --durations=0 -n auto python/tests/ \
              --ignore python/tests/backends \
              --ignore python/tests/contrib
            pytest_status=$?
            if [ ! $pytest_status -eq 0 ]; then
              echo "::error file=test_in_devenv.yml::Python tests failed with status $pytest_status."
              exit 1
            fi
            mock_qpu_failures=""
            for backendTest in python/tests/backends/*.py; do
              output=$(python -m pytest -v -s --durations=0 $backendTest 2>&1)
              pytest_status=$?
              echo "$output"
              if echo "$output" | grep -q "Mock qpu not available"; then
                echo "::error file=test_in_devenv.yml::Mock QPU unavailable for $backendTest"
                mock_qpu_failures="$mock_qpu_failures $backendTest"
              fi
              # Exit code 5 indicates that no tests were collected,
              # i.e. all tests in this file were skipped.
              if [ ! $pytest_status -eq 0 ] && [ ! $pytest_status -eq 5 ]; then
                echo "::error file=test_in_devenv.yml::Python $backendTest tests failed with status $pytest_status."
                exit 1
              fi
            done
            if [ -n "$mock_qpu_failures" ]; then
              echo "::error file=test_in_devenv.yml::Mock QPU tests skipped due to missing startServer:$mock_qpu_failures"
              exit 1
            fi

            pip install qiskit
            python -m pytest -v --durations=0  python/tests/contrib
            pytest_status=$?
            if [ ! $pytest_status -eq 0 ]; then
              echo "::error file=test_in_devenv.yml::Python contrib tests failed with status $pytest_status."
              exit 1
            fi

      - name: Extract ccache from container
        timeout-minutes: 15
        continue-on-error: true
        run: |
          # The Python build runs inside a container (via run-in-docker),
          # so ccache data is in the most recently stopped container.
          mkdir -p /tmp/ccache-export/ccache
          container=$(docker ps -a -q --filter ancestor=dev_env:local --latest)
          if [ -n "$container" ]; then
            docker cp "$container:/root/.ccache/." /tmp/ccache-export/ccache/ 2>/dev/null
          fi

      - name: Push ccache to GHCR
        uses: ./.github/actions/ccache-push
        with:
          cache-key: ${{ steps.platform_meta.outputs.platform_id }}-devenv-python
          cache-path: /tmp/ccache-export/ccache
          registry-token: ${{ github.token }}

      - name: Save environment
        id: env_save
        if: inputs.export_environment
        run: |
          output_directory=/tmp
          platform_id=`echo ${{ inputs.platform }} | sed 's/linux\///g' | tr -d ' '`
          filename=${platform_id}_python_build

          docker run --name dev_env dev_env:local
          docker export dev_env > $output_directory/$filename.tar
          docker rm -f dev_env

          echo "filename=$filename" >> $GITHUB_OUTPUT
          echo "output_directory=$output_directory" >> $GITHUB_OUTPUT

      - name: Upload environment
        uses: actions/upload-artifact@v4
        if: inputs.export_environment
        with:
          name: ${{ steps.env_save.outputs.filename }}
          path: ${{ steps.env_save.outputs.output_directory }}/${{ steps.env_save.outputs.filename }}.tar
          retention-days: 1
