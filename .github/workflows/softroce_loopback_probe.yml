name: SoftRoCE Capability Probe

on:
  workflow_dispatch:
    inputs:
      run_channel_probe:
        description: "Also run the full CpuRoceChannel device-call probe."
        required: false
        type: boolean
        default: false
      run_gpu_channel_probe:
        description: "Also run the CpuRoceChannel nvidia-target probe on a GPU runner."
        required: false
        type: boolean
        default: false
      channel_probe_base_image:
        description: "Optional devdeps base image digest/tag override for the channel probe."
        required: false
        type: string
        default: ""
      cache_base:
        description: "Branch to use as devdeps cache base when resolving the channel probe image."
        required: false
        type: string
        default: main
  push:
    branches:
      - softroce-loopback-investigation
      - "pull-request/[0-9]+"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  metadata:
    name: Retrieve channel probe build metadata
    if: ${{ (github.event_name == 'workflow_dispatch' && (inputs.run_channel_probe || inputs.run_gpu_channel_probe)) || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      cache_base: ${{ steps.cache.outputs.cache_base }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - id: cache
        run: echo "cache_base=${{ inputs.cache_base || 'main' }}" >> $GITHUB_OUTPUT

  cuda_deps:
    name: Load channel probe build dependencies
    if: ${{ (github.event_name == 'workflow_dispatch' && (inputs.run_channel_probe || inputs.run_gpu_channel_probe)) || github.event_name == 'push' }}
    needs: metadata
    uses: ./.github/workflows/dev_environment.yml
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_READONLY_TOKEN: ${{ secrets.DOCKERHUB_READONLY_TOKEN }}
    with:
      platforms: linux/amd64
      dockerfile: build/devdeps.Dockerfile
      build_config_id: gcc12
      build_args: toolchain=gcc12
      registry_cache_from: ${{ needs.metadata.outputs.cache_base }}
      checkout_submodules: true
      environment: ghcr-ci
      matrix_key: amd64-gcc12-realtime
      matrix_step_name: softroce_channel_probe_cuda_deps

  config_cuda_deps:
    name: Configure channel probe build dependencies
    if: ${{ (github.event_name == 'workflow_dispatch' && (inputs.run_channel_probe || inputs.run_gpu_channel_probe)) || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    needs: cuda_deps
    outputs:
      json: "${{ steps.read_json.outputs.result }}"
    steps:
      - uses: cloudposse/github-action-matrix-outputs-read@1.0.0
        id: read_json
        with:
          matrix-step-name: softroce_channel_probe_cuda_deps

  probe:
    name: Probe rdma_rxe local traffic
    runs-on: linux-amd64-cpu8
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install RDMA tooling and packaged RXE modules
        shell: bash
        run: |
          retry() {
            for n in 1 2 3; do
              "$@" && return 0
              sleep $((10 * n * n))
            done
            return 1
          }
          kernel="$(uname -r)"
          retry sudo apt-get update
          retry sudo apt-get install -y --no-install-recommends \
            g++ iproute2 iputils-ping kmod rdma-core ibverbs-utils libibverbs-dev

          exact_extra="linux-modules-extra-${kernel}"
          if apt-cache show "$exact_extra" >/dev/null 2>&1; then
            retry sudo apt-get install -y --no-install-recommends \
              --allow-change-held-packages \
              "$exact_extra"
          else
            echo "No apt package candidate for running kernel: $exact_extra"
          fi

          sudo depmod -a "$kernel" || true
          modinfo rdma_rxe || modinfo rxe || true

      - name: Run SoftRoCE traffic probes
        shell: bash
        run: |
          run_probe() {
            local label="$1"
            shift
            echo "::group::${label}"
            set +e
            sudo bash realtime/scripts/setup_softroce_loopback.sh \
              --cleanup-first \
              "$@" \
              --verify-pingpong
            local rc=$?
            echo "${label}: rc=${rc}"
            echo "::endgroup::"
            return "$rc"
          }

          set +e
          run_probe "single-device self-loop" --self-loop
          self_rc=$?
          run_probe "two-device same-namespace"
          two_rc=$?
          run_probe "netns-create-only two-device" --use-netns --skip-rdma-netns-move
          netns_create_rc=$?
          run_probe "netns-isolated two-device" --use-netns
          netns_rc=$?
          set -e

          echo "SoftRoCE probe summary: self-loop=${self_rc}, same-namespace=${two_rc}, netns-create-only=${netns_create_rc}, netns=${netns_rc}"
          if [[ "$netns_create_rc" != "0" ]]; then
            echo "::notice::Creating RXE from inside netns without rdma dev set ... netns did not produce a working isolated endpoint."
          fi
          if [[ "$netns_rc" == "77" ]]; then
            echo "::notice::SoftRoCE netns isolation unsupported here; this is separate from basic RXE support."
          fi
          if [[ "$two_rc" != "0" ]]; then
            echo "::notice::Two-device same-namespace RXE traffic failed; both endpoint IPs are local in one netns, so this topology may not be viable."
          fi
          if [[ "$self_rc" == "0" || "$two_rc" == "0" || "$netns_create_rc" == "0" || "$netns_rc" == "0" ]]; then
            exit 0
          fi
          echo "::error::No SoftRoCE UC traffic probe passed."
          exit 1

      - name: Run CpuRoceTransceiver self-loop probe
        shell: bash
        run: |
          g++ -std=c++17 -Wall -Wextra \
            -Irealtime/include \
            realtime/scripts/probe_cpu_roce_self_loop.cpp \
            realtime/lib/cpu_transport/roce_transceiver.cpp \
            -libverbs -pthread \
            -o /tmp/cudaq_cpu_roce_self_loop_probe

          sudo bash realtime/scripts/setup_softroce_loopback.sh \
            --cleanup-first \
            --self-loop \
            --verify-pingpong \
            --no-exports

          sudo /tmp/cudaq_cpu_roce_self_loop_probe \
            --device rxe_cudaq0 \
            --ip 10.88.0.1

      - name: Run CpuRoceTransceiver two-process self-loop probe
        shell: bash
        run: |
          g++ -std=c++17 -Wall -Wextra \
            -Irealtime/include \
            realtime/scripts/probe_cpu_roce_two_process.cpp \
            realtime/lib/cpu_transport/roce_transceiver.cpp \
            -libverbs -pthread \
            -o /tmp/cudaq_cpu_roce_two_process_probe

          sudo bash realtime/scripts/setup_softroce_loopback.sh \
            --cleanup-first \
            --self-loop \
            --verify-pingpong \
            --no-exports

          log_dir="$(mktemp -d)"
          server_log="${log_dir}/server.log"
          client_log="${log_dir}/client.log"
          server_pid=""
          cleanup_server() {
            if [[ -n "${server_pid}" ]] && kill -0 "${server_pid}" 2>/dev/null; then
              kill "${server_pid}" 2>/dev/null || true
              wait "${server_pid}" 2>/dev/null || true
            fi
          }
          trap cleanup_server EXIT

          timeout 30s sudo /tmp/cudaq_cpu_roce_two_process_probe \
            --role server \
            --device rxe_cudaq0 \
            --ip 10.88.0.1 \
            --port 39017 \
            >"${server_log}" 2>&1 &
          server_pid=$!

          for _ in $(seq 1 100); do
            if grep -q "TWO_PROCESS_SERVER_READY" "${server_log}"; then
              break
            fi
            if ! kill -0 "${server_pid}" 2>/dev/null; then
              break
            fi
            sleep 0.1
          done

          if ! grep -q "TWO_PROCESS_SERVER_READY" "${server_log}"; then
            echo "ERROR: two-process server did not become ready" >&2
            cat "${server_log}" >&2 || true
            exit 1
          fi

          set +e
          timeout 30s sudo /tmp/cudaq_cpu_roce_two_process_probe \
            --role client \
            --device rxe_cudaq0 \
            --ip 10.88.0.1 \
            --port 39017 \
            >"${client_log}" 2>&1
          client_rc=$?
          wait "${server_pid}"
          server_rc=$?
          set -e
          server_pid=""

          echo "--- CpuRoceTransceiver two-process client log ---"
          cat "${client_log}" || true
          echo "--- CpuRoceTransceiver two-process server log ---"
          cat "${server_log}" || true
          rm -rf "${log_dir}"

          if [[ "${client_rc}" != "0" || "${server_rc}" != "0" ]]; then
            echo "ERROR: CpuRoceTransceiver two-process self-loop failed (client=${client_rc}, server=${server_rc})" >&2
            exit 1
          fi

      - name: Diagnostics
        if: always()
        shell: bash
        run: |
          uname -a || true
          ip route show table local || true
          modinfo rdma_rxe || modinfo rxe || true
          rdma system show || true
          apt-cache search "linux-modules.*$(uname -r)" || true
          apt-cache policy "linux-modules-extra-$(uname -r)" linux-modules-extra-aws || true
          find "/lib/modules/$(uname -r)" -type f \( -iname '*rxe*' -o -iname 'ib_core*' -o -iname 'rdma_cm*' -o -iname 'ib_uverbs*' \) || true
          ip netns list || true
          for ns in cudaq-rxe-ns-a cudaq-rxe-ns-b; do
            sudo ip netns exec "$ns" ip -br addr || true
            sudo ip netns exec "$ns" rdma dev show || true
            sudo ip netns exec "$ns" rdma link show || true
            sudo ip netns exec "$ns" ibv_devices || true
          done
          ip -br addr || true
          ip link show type veth || true
          rdma dev show || true
          rdma link show || true
          ibv_devices || true
          ibv_devinfo || true
          lsmod | grep -E '(^rdma_rxe|^rxe)' || true

      - name: Clean up SoftRoCE loopback
        if: always()
        shell: bash
        run: |
          sudo bash realtime/scripts/setup_softroce_loopback.sh --cleanup --use-netns

  channel_probe:
    name: Run CpuRoceChannel device-call self-loop probe
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.run_channel_probe) || github.event_name == 'push' }}
    needs: [probe, config_cuda_deps]
    runs-on: linux-amd64-cpu8
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GitHub CR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Install RDMA tooling and packaged RXE modules
        shell: bash
        run: |
          retry() {
            for n in 1 2 3; do
              "$@" && return 0
              sleep $((10 * n * n))
            done
            return 1
          }
          kernel="$(uname -r)"
          retry sudo apt-get update
          retry sudo apt-get install -y --no-install-recommends \
            iproute2 kmod rdma-core ibverbs-utils

          exact_extra="linux-modules-extra-${kernel}"
          if apt-cache show "$exact_extra" >/dev/null 2>&1; then
            retry sudo apt-get install -y --no-install-recommends \
              --allow-change-held-packages \
              "$exact_extra"
          else
            echo "No apt package candidate for running kernel: $exact_extra"
          fi

          sudo depmod -a "$kernel" || true
          modinfo rdma_rxe || modinfo rxe || true

      - name: Build and run CpuRoceChannel device-call self-loop probe
        shell: bash
        env:
          DOCKER_BUILDKIT: "1"
          CHANNEL_PROBE_BASE_IMAGE: ${{ github.event_name == 'workflow_dispatch' && inputs.channel_probe_base_image != '' && inputs.channel_probe_base_image || fromJson(needs.config_cuda_deps.outputs.json).image_hash[format('{0}-gcc12-realtime', 'amd64')] }}
        run: |
          if [[ -z "${CHANNEL_PROBE_BASE_IMAGE}" || "${CHANNEL_PROBE_BASE_IMAGE}" == "null" ]]; then
            echo "::error::Could not resolve the amd64-gcc12-realtime devdeps image for the channel probe."
            exit 1
          fi
          echo "Using channel probe base image: ${CHANNEL_PROBE_BASE_IMAGE}"

          docker build \
            --file docker/release/cudaq.realtime-integration.Dockerfile \
            --target realtime-integration \
            --build-arg "base_image=${CHANNEL_PROBE_BASE_IMAGE}" \
            --build-arg cuda_version=12.6 \
            --build-arg build_device_call_tests=true \
            --tag cudaq-realtime-softroce:local \
            .

          sudo bash realtime/scripts/setup_softroce_loopback.sh \
            --cleanup-first \
            --self-loop \
            --verify-pingpong \
            --no-exports

          cat > /tmp/cudaq-realtime-softroce-rdma.Dockerfile <<'EOF'
          FROM cudaq-realtime-softroce:local
          RUN apt-get update && apt-get install -y --no-install-recommends \
                ibverbs-providers ibverbs-utils rdma-core \
              && apt-get clean \
              && rm -rf /var/lib/apt/lists/*
          EOF
          docker build \
            --file /tmp/cudaq-realtime-softroce-rdma.Dockerfile \
            --tag cudaq-realtime-softroce-rdma:local \
            /tmp

          probe_container_visibility() {
            local label="$1"
            shift
            echo "::group::Container RXE visibility: ${label}"
            set +e
            docker run --rm "$@" \
              cudaq-realtime-softroce-rdma:local \
              bash -lc '
                set -euo pipefail
                echo "--- ibv_devices ---"
                devices="$(ibv_devices)"
                printf "%s\n" "$devices"
                printf "%s\n" "$devices" | awk "NR > 2 { print \$1 }" | grep -qx rxe_cudaq0
              '
            local rc=$?
            echo "container visibility ${label}: rc=${rc}"
            echo "::endgroup::"
            return "${rc}"
          }

          set +e
          probe_container_visibility "default"
          default_rc=$?
          probe_container_visibility "host-network" --network host
          hostnet_rc=$?
          probe_container_visibility "infiniband-bind" \
            --mount type=bind,source=/dev/infiniband,target=/dev/infiniband
          ibbind_only_rc=$?
          probe_container_visibility "infiniband-bind-host-network" \
            --network host \
            --mount type=bind,source=/dev/infiniband,target=/dev/infiniband
          ibbind_hostnet_rc=$?
          probe_container_visibility "privileged" \
            --privileged \
            --ulimit memlock=-1:-1
          privileged_only_rc=$?
          probe_container_visibility "privileged-host-network" \
            --privileged \
            --network host \
            --ulimit memlock=-1:-1
          privileged_hostnet_rc=$?
          set -e

          echo "Container RXE visibility summary: default=${default_rc}, host-network=${hostnet_rc}, infiniband-bind=${ibbind_only_rc}, infiniband-bind-host-network=${ibbind_hostnet_rc}, privileged=${privileged_only_rc}, privileged-host-network=${privileged_hostnet_rc}"
          if [[ "${privileged_hostnet_rc}" != "0" ]]; then
            echo "::error::Known-good privileged host-network container did not see rxe_cudaq0."
            exit 1
          fi

          docker run --rm \
            --privileged \
            --network host \
            --ulimit memlock=-1:-1 \
            cudaq-realtime-softroce-rdma:local \
            bash -lc '
              set -euo pipefail
              ibv_devices
              /cuda-quantum/unittests/device_call/cpu_roce_device_call_test.sh \
                --build-dir /tmp/build-realtime-integration/cudaq \
                --channel-device rxe_cudaq0 \
                --channel-ip 10.88.0.1 \
                --daemon-device rxe_cudaq0 \
                --daemon-ip 10.88.0.1 \
                --filter CpuRoceDispatchTest.DispatchesAddThemSynchronously
              /cuda-quantum/unittests/device_call/cpu_roce_device_call_test.sh \
                --build-dir /tmp/build-realtime-integration/cudaq \
                --channel-device rxe_cudaq0 \
                --channel-ip 10.88.0.1 \
                --daemon-device rxe_cudaq0 \
                --daemon-ip 10.88.0.1 \
                --app
            '

      - name: Diagnostics
        if: always()
        shell: bash
        run: |
          uname -a || true
          ip route show table local || true
          modinfo rdma_rxe || modinfo rxe || true
          rdma system show || true
          ip -br addr || true
          ip link show type veth || true
          rdma dev show || true
          rdma link show || true
          ibv_devices || true
          ibv_devinfo || true
          lsmod | grep -E '(^rdma_rxe|^rxe)' || true

      - name: Cleanup SoftRoCE topology
        if: always()
        shell: bash
        run: sudo bash realtime/scripts/setup_softroce_loopback.sh --cleanup --use-netns

  gpu_channel_probe:
    name: Run CpuRoceChannel nvidia-target SoftRoCE probe
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.run_gpu_channel_probe) || github.event_name == 'push' }}
    runs-on: linux-amd64-gpu-a100-latest-1
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install RDMA tooling and packaged RXE modules
        shell: bash
        run: |
          retry() {
            for n in 1 2 3; do
              "$@" && return 0
              sleep $((10 * n * n))
            done
            return 1
          }
          kernel="$(uname -r)"
          retry sudo apt-get update
          retry sudo apt-get install -y --no-install-recommends \
            iproute2 iputils-ping kmod rdma-core ibverbs-utils libibverbs-dev

          exact_extra="linux-modules-extra-${kernel}"
          if apt-cache show "$exact_extra" >/dev/null 2>&1; then
            retry sudo apt-get install -y --no-install-recommends \
              --allow-change-held-packages \
              "$exact_extra"
          else
            echo "No apt package candidate for running kernel: $exact_extra"
          fi

          sudo depmod -a "$kernel" || true
          modinfo rdma_rxe || modinfo rxe || true
          nvidia-smi

      - name: Build and run nvidia-target device-call probe over SoftRoCE
        shell: bash
        env:
          DOCKER_BUILDKIT: "1"
          CHANNEL_PROBE_BASE_IMAGE: ${{ github.event_name == 'workflow_dispatch' && inputs.channel_probe_base_image != '' && inputs.channel_probe_base_image || 'ghcr.io/nvidia/cuda-quantum-devdeps:gcc12-main' }}
        run: |
          if [[ -z "${CHANNEL_PROBE_BASE_IMAGE}" || "${CHANNEL_PROBE_BASE_IMAGE}" == "null" ]]; then
            echo "::error::Could not resolve the amd64-gcc12-realtime devdeps image for the GPU channel probe."
            exit 1
          fi
          echo "Using channel probe base image: ${CHANNEL_PROBE_BASE_IMAGE}"

          docker build \
            --file docker/release/cudaq.realtime-integration.Dockerfile \
            --target realtime-integration \
            --build-arg "base_image=${CHANNEL_PROBE_BASE_IMAGE}" \
            --build-arg cuda_version=12.6 \
            --build-arg build_device_call_tests=true \
            --tag cudaq-realtime-softroce:local \
            .

          sudo bash realtime/scripts/setup_softroce_loopback.sh \
            --cleanup-first \
            --self-loop \
            --verify-pingpong \
            --no-exports

          cat > /tmp/cudaq-realtime-softroce-rdma.Dockerfile <<'EOF'
          FROM cudaq-realtime-softroce:local
          RUN apt-get update && apt-get install -y --no-install-recommends \
                ibverbs-providers ibverbs-utils rdma-core \
              && apt-get clean \
              && rm -rf /var/lib/apt/lists/*
          EOF
          docker build \
            --file /tmp/cudaq-realtime-softroce-rdma.Dockerfile \
            --tag cudaq-realtime-softroce-rdma:local \
            /tmp

          docker run --rm \
            --gpus all \
            --privileged \
            --network host \
            --ulimit memlock=-1:-1 \
            cudaq-realtime-softroce-rdma:local \
            bash -lc '
              set -euo pipefail
              nvidia-smi
              ibv_devices
              /cuda-quantum/unittests/device_call/cpu_roce_device_call_test.sh \
                --build-dir /tmp/build-realtime-integration/cudaq \
                --channel-device rxe_cudaq0 \
                --channel-ip 10.88.0.1 \
                --daemon-device rxe_cudaq0 \
                --daemon-ip 10.88.0.1 \
                --app \
                --app-target nvidia
            '

      - name: Diagnostics
        if: always()
        shell: bash
        run: |
          uname -a || true
          nvidia-smi || true
          ip route show table local || true
          modinfo rdma_rxe || modinfo rxe || true
          rdma system show || true
          ip -br addr || true
          ip link show type veth || true
          rdma dev show || true
          rdma link show || true
          ibv_devices || true
          ibv_devinfo || true
          lsmod | grep -E '(^rdma_rxe|^rxe)' || true

      - name: Cleanup SoftRoCE topology
        if: always()
        shell: bash
        run: sudo bash realtime/scripts/setup_softroce_loopback.sh --cleanup --use-netns
