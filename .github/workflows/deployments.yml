on:
  # We update the build caches during the pull_request_target event,
  # and deploy the images via workflow dispatch on branches with deployment permissions.
  # A dispatch event is automatically triggered when the pull_request_target event
  # triggers the workflow.
  # NOTE: This is a thin caller for the reusable deployments-impl.yml workflow. The
  # nightly scheduled runs live on their own pages (deployments-devdeps-nightly.yml and
  # deployments-devcontainer-nightly.yml) so that this page only lists full deployments.
  workflow_dispatch:
    inputs:
      update_registry_cache:
        type: boolean
        description: Create or update the build caches on the container registry. The build terminates after that and no images are pushed.
        required: false
        default: false
      cache_base:
        required: false
        type: string
        description: 'The name of the branch to use as cache base.'
        default: main
      platforms:
        type: string
        description: The platforms to build the Docker images for. A semicolon separated list creates a separate list for each platform, whereas a comma separate list creates a multi-platform build.
        required: false
        default: default
      devcontainer_only:
        type: boolean
        description: Build and push only the dev container image.
        required: false
        default: false
      create_release:
        type: string
        description: Create a GitHub release with the given version number (e.g. 0.3.0). A GitHub release with that version must not exist already.
        required: false
        default: ''
      include_macos:
        type: boolean
        description: Build and include macOS wheels and installer.
        required: false
        default: true
      run_publishing_after:
        type: boolean
        description: When this deployment completes successfully, automatically trigger the Publishing workflow.
        required: false
        default: false
  workflow_run:
    workflows:
      - PR merged
    types:
      - completed
    # PR merged workflow runs after merge into certain branches an on pull_request_target;
    # there should hence be no need for additional branch filtering here.
  push:
    branches:
      - 'releases/*'
      - 'staging/*'
      - 'experimental/*'
      - 'features/*'

name: Deployments # do not change name without updating workflow_run triggers

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    uses: ./.github/workflows/deployments-impl.yml
    secrets: inherit
    with:
      # Pass the workflow_dispatch inputs through; for workflow_run/push events the
      # reusable core ignores these (it branches on github.event_name), so we only need
      # type-valid values. Booleans default false use `&& input`; include_macos defaults
      # true so it uses the `!= 'workflow_dispatch' || input` form to avoid being forced true.
      update_registry_cache: ${{ github.event_name == 'workflow_dispatch' && inputs.update_registry_cache }}
      devcontainer_only: ${{ github.event_name == 'workflow_dispatch' && inputs.devcontainer_only }}
      run_publishing_after: ${{ github.event_name == 'workflow_dispatch' && inputs.run_publishing_after }}
      include_macos: ${{ github.event_name != 'workflow_dispatch' || inputs.include_macos }}
      cache_base: ${{ (github.event_name == 'workflow_dispatch' && inputs.cache_base) || 'main' }}
      platforms: ${{ (github.event_name == 'workflow_dispatch' && inputs.platforms) || 'default' }}
      create_release: ${{ (github.event_name == 'workflow_dispatch' && inputs.create_release) || '' }}
