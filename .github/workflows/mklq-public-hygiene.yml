name: MKL-Q public hygiene

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  hygiene:
    name: Source-only repository checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Reject local and generated artifacts
        shell: bash
        run: |
          set -euo pipefail
          if git ls-files | grep -E '(^|/)(__pycache__|\.pytest_cache)(/|$)|\.pyc$|\.DS_Store$|^build(-python)?/|^benchmarks/mklq/results/|^docs/superpowers/|^(dist|wheelhouse)/|\.(whl|dmg|pkg|zip)$|\.tar\.gz$'; then
            echo "Generated, local, release, or agent-internal files are tracked."
            exit 1
          fi

      - name: Check MKL-Q public metadata
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'MKL-Q' README.md
          grep -q 'mklq-cpu' README.md
          grep -q 'mklq-metal' README.md
          grep -q 'source-only' README.md
          grep -q 'cudaq' README.md
          test -f docs/mklq/known-limitations.md
          test -f docs/mklq/architecture.md
          test -f docs/mklq/testing-matrix.md
          test -f docs/mklq/upstream-sync.md
          test -f docs/mklq/release-policy.md
          test -f docs/mklq/public-release-checklist.md
          test -f docs/mklq/developer-workflow.md
          test -f docs/mklq/maintainer-runbook.md
          test -f docs/mklq/issue-labels.md
          test -f .github/labels.yml
          test -f docs/mklq/branch-protection.md
          test -f docs/mklq/public-readiness.md
          test -f .github/branch-protection-main.json
          test -f .github/pull_request_template.md
          test -f examples/mklq/README.md
          test -f examples/mklq/python/bell.py
          test -f examples/mklq/python/ghz.py
          test -f examples/mklq/verify_examples.py
          test -f examples/mklq/cpp/bell.cpp
          test -f examples/mklq/cpp/ghz.cpp
          test -f benchmarks/mklq/check_performance_evidence.py
          test -f benchmarks/mklq/run_public_healthcheck.py
          grep -q 'examples/mklq' README.md
          grep -q 'mklq-cpu' examples/mklq/README.md
          grep -q 'mklq-metal' examples/mklq/README.md
          grep -q 'nvq++' examples/mklq/README.md
          grep -q 'mklq-cpu' docs/mklq/known-limitations.md
          grep -q 'mklq-metal' docs/mklq/known-limitations.md
          grep -q 'source-only' docs/mklq/known-limitations.md
          grep -q 'Public Compatibility Boundary' docs/mklq/architecture.md
          grep -q 'CPU Backend' docs/mklq/architecture.md
          grep -q 'Metal Backend' docs/mklq/architecture.md
          grep -q 'not cross-machine performance certification' docs/mklq/architecture.md
          grep -q 'Gate Summary' docs/mklq/testing-matrix.md
          grep -q 'Capability Coverage' docs/mklq/testing-matrix.md
          grep -q 'Known Coverage Gaps' docs/mklq/testing-matrix.md
          grep -q 'No full Metal-native guarantee' docs/mklq/testing-matrix.md
          grep -q 'check_performance_evidence.py' docs/mklq/testing-matrix.md
          grep -q 'run_public_healthcheck.py' docs/mklq/testing-matrix.md
          grep -q 'Preflight' docs/mklq/upstream-sync.md
          grep -q 'Conflict Rules' docs/mklq/upstream-sync.md
          grep -q 'Post-merge Gates' docs/mklq/upstream-sync.md
          grep -q 'Stop Conditions' docs/mklq/upstream-sync.md
          grep -q 'Current Policy' docs/mklq/release-policy.md
          grep -q 'source-only' docs/mklq/release-policy.md
          grep -q 'Wheel And PyPI Entry Criteria' docs/mklq/release-policy.md
          grep -q 'Stop Conditions' docs/mklq/release-policy.md
          grep -q 'source-only' docs/mklq/public-release-checklist.md
          grep -q 'Correctness Gate' docs/mklq/public-release-checklist.md
          grep -q 'GitHub Verification' docs/mklq/public-release-checklist.md
          grep -q 'check_performance_evidence.py' docs/mklq/public-release-checklist.md
          grep -q 'run_public_healthcheck.py' docs/mklq/public-release-checklist.md
          grep -q 'Upstream Sync' docs/mklq/developer-workflow.md
          grep -q 'Correctness Gates' docs/mklq/developer-workflow.md
          grep -q 'Benchmark Evidence' docs/mklq/developer-workflow.md
          grep -q 'Public Hygiene' docs/mklq/developer-workflow.md
          grep -q 'check_performance_evidence.py' docs/mklq/developer-workflow.md
          grep -q 'run_public_healthcheck.py' docs/mklq/developer-workflow.md
          grep -q 'Maintainer Principles' docs/mklq/maintainer-runbook.md
          grep -q 'Routine Health Check' docs/mklq/maintainer-runbook.md
          grep -q 'check_performance_evidence.py' docs/mklq/maintainer-runbook.md
          grep -q 'run_public_healthcheck.py' docs/mklq/maintainer-runbook.md
          grep -q 'Issue Triage' docs/mklq/maintainer-runbook.md
          grep -q 'Pull Request Intake' docs/mklq/maintainer-runbook.md
          grep -q 'Release And Artifact Requests' docs/mklq/maintainer-runbook.md
          grep -q 'Recovery' docs/mklq/maintainer-runbook.md
          grep -q 'Label Taxonomy' docs/mklq/issue-labels.md
          grep -q 'needs-repro' docs/mklq/issue-labels.md
          grep -q 'backend:cpu' .github/labels.yml
          grep -q 'backend:metal' .github/labels.yml
          grep -q 'release-policy' .github/labels.yml
          grep -q 'needs-repro' .github/ISSUE_TEMPLATE/bug_report.yaml
          grep -q 'Source-only repository checks' docs/mklq/branch-protection.md
          grep -q 'Public Readiness' docs/mklq/public-readiness.md
          grep -q 'source-only' docs/mklq/public-readiness.md
          grep -q 'Branch Protection' docs/mklq/public-readiness.md
          grep -q 'No Tags Or Releases' docs/mklq/public-readiness.md
          grep -q 'not a release certification' docs/mklq/public-readiness.md
          grep -q 'allow_force_pushes' .github/branch-protection-main.json
          grep -q 'allow_deletions' .github/branch-protection-main.json
          grep -q 'Compatibility Boundary' .github/pull_request_template.md
          grep -q 'Benchmark Evidence' .github/pull_request_template.md
          grep -q 'Public Hygiene' .github/pull_request_template.md
          grep -q 'testing-matrix.md' .github/pull_request_template.md
          grep -q 'upstream-sync.md' .github/pull_request_template.md
          grep -q 'release-policy.md' .github/pull_request_template.md
          grep -q 'mklq-metal' .github/pull_request_template.md
          grep -q 'not a release certification' docs/mklq/validation.md
          python3 - <<'PY'
          from pathlib import Path

          banned = [
              "cuda-quantum" + "@nvidia.com",
              "github.com/NVIDIA/cuda-quantum" + "/actions",
              "nv-" + "slack",
              "ops-" + "bot",
              "copy-pr-" + "bot",
          ]
          paths = [
              Path("README.md"),
              Path("CITATION.cff"),
              Path("Contributing.md"),
              Path("SECURITY.md"),
              Path(".github/pull_request_template.md"),
              Path("examples/mklq/README.md"),
          ]
          paths.extend(Path("docs/mklq").glob("*.md"))
          paths.extend(path for path in Path(".github").rglob("*") if path.is_file())
          failures = []
          for path in paths:
              text = path.read_text(encoding="utf-8", errors="replace")
              for token in banned:
                  if token in text:
                      failures.append(f"{path}: contains {token}")
          if failures:
              raise SystemExit("\n".join(failures))
          PY

      - name: Parse benchmark summaries
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          report_dir = Path("benchmarks/mklq/reports")
          summaries = sorted(report_dir.glob("*.summary.json"))
          if not summaries:
              raise SystemExit("No sanitized MKL-Q benchmark summaries found.")
          for path in summaries:
              with path.open("r", encoding="utf-8") as handle:
                  json.load(handle)
          print(f"Parsed {len(summaries)} benchmark summary file(s).")
          PY

      - name: Check clean CPU performance evidence
        shell: bash
        run: |
          set -euo pipefail
          python3 benchmarks/mklq/check_performance_evidence.py

      - name: Compile public Python helpers and examples
        shell: bash
        run: |
          set -euo pipefail
          python3 -m py_compile \
            benchmarks/mklq/bench_mklq_targets.py \
            benchmarks/mklq/bench_probability_kernels.py \
            benchmarks/mklq/check_performance_evidence.py \
            benchmarks/mklq/make_summary.py \
            benchmarks/mklq/run_clean_cpu_benchmark.py \
            benchmarks/mklq/run_correctness_gate.py \
            benchmarks/mklq/run_public_healthcheck.py \
            benchmarks/mklq/summarize_reports.py \
            examples/mklq/python/bell.py \
            examples/mklq/python/ghz.py \
            examples/mklq/verify_examples.py
