on:
  workflow_call:
    inputs:
      platform:
        type: string
        required: false
        default: linux/amd64
      devdeps_image:
        required: false
        type: string
      devdeps_cache:
        required: false
        type: string
      devdeps_archive:
        required: false
        type: string
      export_environment:
        required: false
        type: boolean
    secrets:
      CODECOV_TOKEN:
        required: false

name: Show Code Coverage Diff

jobs:
  gen_code_coverage:
    runs-on: ${{ (contains(inputs.platform, 'arm') && 'linux-arm64-cpu8') || 'linux-amd64-cpu8' }}
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Log in to GitHub CR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Restore environment
        id: restore_devdeps
        if: inputs.devdeps_cache && inputs.devdeps_archive
        uses: actions/cache/restore@v4
        with:
          path: ${{ inputs.devdeps_archive }}
          key: ${{ inputs.devdeps_cache }}
          fail-on-cache-miss: true

      - name: Set up QEMU
        shell: bash
        run: |
          export QEMU_VERSION=10.0.2+ds-1
          export REPO_DATE=20250601T025158Z

          if echo "${{ inputs.platform }}" | grep -iq 'arm'; then
            export QEMU_ARCH="arm64"
            export QEMU_USER_STATIC_PACKAGE=qemu-user-static_${QEMU_VERSION}_${QEMU_ARCH}.deb
            export QEMU_USER_BINFMT_PACKAGE=qemu-user-binfmt_${QEMU_VERSION}_${QEMU_ARCH}.deb
            export QEMU_USER_PACKAGE=qemu-user_${QEMU_VERSION}_${QEMU_ARCH}.deb

            export QEMU_USER_STATIC_PACKAGE_SHA256=ea73f5e6abb82a923d91d1d8445871d09041e914fe59445c44bbc678f6000aca
            export QEMU_USER_BINFMT_PACKAGE_SHA256=a0f4096e6fdf7e7f5ab81f076853c4cb6dbf3088f6b71e079ad06449b8382730
            export QEMU_USER_PACKAGE_SHA256=2ad5d75a56df6cb228aad1071486bb820e5cd9bd8e46b81f0193267acb63168f
          else
            export QEMU_ARCH="amd64"
            export QEMU_USER_STATIC_PACKAGE=qemu-user-static_${QEMU_VERSION}_${QEMU_ARCH}.deb
            export QEMU_USER_BINFMT_PACKAGE=qemu-user-binfmt_${QEMU_VERSION}_${QEMU_ARCH}.deb
            export QEMU_USER_PACKAGE=qemu-user_${QEMU_VERSION}_${QEMU_ARCH}.deb

            export QEMU_USER_STATIC_PACKAGE_SHA256=681cf3d95306b0d06de06efa5ab015270c1151f5b9810b15639821a8fe486a78
            export QEMU_USER_BINFMT_PACKAGE_SHA256=99cee71a829cbc8f8ac632558f0a47deab2c996b323e54bb001b4bf8ff54cff9
            export QEMU_USER_PACKAGE_SHA256=d50840ea2abcaf4fbb7c5a5f35794348b2458f41d66adbd95c1138e4f63f6ce9
          fi

          wget -q http://snapshot.debian.org/archive/debian/${REPO_DATE}/pool/main/q/qemu/${QEMU_USER_BINFMT_PACKAGE}
          wget -q http://snapshot.debian.org/archive/debian/${REPO_DATE}/pool/main/q/qemu/${QEMU_USER_PACKAGE}
          wget -q http://snapshot.debian.org/archive/debian/${REPO_DATE}/pool/main/q/qemu/${QEMU_USER_STATIC_PACKAGE}

          echo "${QEMU_USER_STATIC_PACKAGE_SHA256} ${QEMU_USER_STATIC_PACKAGE}" | sha256sum -c
          echo "${QEMU_USER_BINFMT_PACKAGE_SHA256} ${QEMU_USER_BINFMT_PACKAGE}" | sha256sum -c
          echo "${QEMU_USER_PACKAGE_SHA256} ${QEMU_USER_PACKAGE}" | sha256sum -c

          sudo dpkg -i ${QEMU_USER_PACKAGE} ${QEMU_USER_BINFMT_PACKAGE} ${QEMU_USER_STATIC_PACKAGE}

      - name: Set up context for buildx
        run: |
          docker context create builder_context

      - name: Set up buildx runner
        uses: docker/setup-buildx-action@v3
        with:
          endpoint: builder_context
          version: v0.19.0
          buildkitd-config: /etc/buildkit/buildkitd.toml # hard-coded to run on our runners
          driver-opts: |
            image=moby/buildkit:v0.22.0

      - name: Build CUDA Quantum
        id: cudaq_build
        run: |
          if ${{ steps.restore_devdeps.outcome != 'skipped' }}; then
            load_output=`docker load --input "${{ inputs.devdeps_archive }}"`
            base_image=`echo "$load_output" | grep -o 'Loaded image: \S*:\S*' | head -1 | cut -d ' ' -f 3`
          elif ${{ inputs.devdeps_image != '' }}; then
            base_image=${{ inputs.devdeps_image }}
          else
            echo "::error file=generate_cc.yml::Missing configuration for development dependencies. Either specify the image (i.e. provide devdeps_image) or cache (i.e. provide devdeps_cache and devdeps_archive) that should be used for the build."
            exit 1
          fi

          DOCKER_BUILDKIT=1 docker build --platform ${{ inputs.platform }} \
            -t cuda-quantum-cc:local -f docker/build/cudaq.dev.Dockerfile . \
            --build-arg base_image=$base_image

          devdeps_tag=`echo $base_image | rev | cut -d ":" -f 1 | rev`
          echo "devdeps_tag=$devdeps_tag" >> $GITHUB_OUTPUT

      - name: Create Shared Dir
        run: |
          mkdir -p ${{ github.workspace }}/shared
      - name: Test CUDA Quantum And Generate CC
        uses: ./.github/actions/run-in-docker
        with:
          image: cuda-quantum-cc:local
          shell: bash
          volume: ${{ github.workspace }}/shared:/shared
          run: |
            cd $CUDAQ_REPO_ROOT
            bash scripts/generate_cc.sh -v -c -p
            if [ ! $? -eq 0 ]; then
              echo "generate_cc status = " $?
            else
              chmod -R 777 ./build/ccoverage
              chmod -R 777 ./build/pycoverage
              cp ./build/ccoverage/coverage.txt /shared
              cp ./build/pycoverage/coverage.xml /shared
            fi

      - name: Upload C/C++ & Python Coverage To Codecov
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false
          files: ${{ github.workspace }}/shared/coverage.txt,${{ github.workspace }}/shared/coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

      - name: Delete Shared Dir
        run: |
          rm -r ${{ github.workspace }}/shared

      - name: Save environment
        id: env_save
        if: inputs.export_environment
        run: |
          output_directory=/tmp
          filename=${{ steps.cudaq_build.outputs.devdeps_tag }}_cc_build
          docker run --name cuda-quantum-cc cuda-quantum-cc:local
          docker export cuda-quantum-cc > $output_directory/$filename.tar
          docker rm -f cuda-quantum-cc

          echo "filename=$filename" >> $GITHUB_OUTPUT
          echo "output_directory=$output_directory" >> $GITHUB_OUTPUT

      - name: Upload environment
        uses: actions/upload-artifact@v4
        if: inputs.export_environment
        with:
          name: ${{ steps.env_save.outputs.filename }}
          path: ${{ steps.env_save.outputs.output_directory }}/${{ steps.env_save.outputs.filename }}.tar
          retention-days: 1
