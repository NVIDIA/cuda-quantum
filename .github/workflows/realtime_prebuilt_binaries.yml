on:
  workflow_call:
    inputs:
      platform:
        type: string
        required: false
        default: linux/amd64
      platform_base_image:
        required: false
        type: string
        default: amd64/almalinux:8
        description: The image to use as a base image when building the installer.
      cuda_version:
        required: true
        type: string
        description: The CUDA version used for the build (e.g. 12.3).
      environment:
        type: string
        required: false
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_READONLY_TOKEN:
        required: true

name: Pre-built realtime binaries
jobs:
  build_installer:
    name: Build CUDA Quantum Realtime installers
    runs-on: ${{ (contains(inputs.platform, 'arm') && 'linux-arm64-cpu32') || 'linux-amd64-cpu32' }}
    permissions:
      contents: read
      packages: read
    outputs:
      image_hash: ghcr.io/nvidia/cuda-quantum-realtime-assets-${{ inputs.platform }}-cu${{ inputs.cuda_version }}
      artifact_name: cuda-quantum-realtime-assets-${{ inputs.platform }}-cu${{ inputs.cuda_version }}
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: true

    - name: Log in to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_READONLY_TOKEN }}

    - name: Login to GitHub CR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}
    - name: Set up context for buildx
      run: |
        docker context create builder_context

    - name: Set up buildx runner
      uses: docker/setup-buildx-action@v3
      with:
        endpoint: builder_context
        version: v0.19.0
        buildkitd-config: /etc/buildkit/buildkitd.toml # hard-coded to run on our runners
        driver-opts: |
          network=host
          image=moby/buildkit:v0.19.0
    - name: Build assets
      id: docker_build
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./realtime/docker/assets.Dockerfile
        build-args: |
          base_image=${{ (contains(inputs.platform, 'arm') && 'ghcr.io/nvidia/arm64v8/almalinux:8') || 'ghcr.io/nvidia/amd64/almalinux:8' }}  
          cuda_version=${{ inputs.cuda_version }}
          cuda_native_arg=${{ (contains(inputs.cuda_version, '12') && '80-real;90') || '80-real;90-real;100f-real;110-real;120-real;100-virtual' }}
        tags: ghcr.io/nvidia/cuda-quantum-realtime-assets-${{ inputs.platform }}-cu${{ inputs.cuda_version }}
        # labels: ${{ steps.metadata.outputs.labels }}
        platforms: ${{ inputs.platform }}
        # TODO: set up cache
        # cache-from: |
        #   ${{ inputs.build_cache }}
        #   ${{ steps.config.outputs.additional_build_caches }}
        # TODO: push to the cache registry
        push: false
        # Output the installer
        outputs: type=local,dest=/tmp/install
    - name: Upload installer
      uses: actions/upload-artifact@v4
      with:
        name: install_cuda_quantum_realtime_cu${{ inputs.cuda_version }}.${{ inputs.platform }} 
        path: /tmp/install
        retention-days: 1
        if-no-files-found: error
