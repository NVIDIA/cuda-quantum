on:
  workflow_call:
    inputs:
      platform:
        type: string
        required: false
        default: linux/amd64
      platform_base_image:
        required: false
        type: string
        default: amd64/almalinux:8
        description: The image to use as a base image when building the installer.
      cuda_version:
        required: true
        type: string
        description: The CUDA version used for the build (e.g. 12.3).
      environment:
        type: string
        required: false
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_READONLY_TOKEN:
        required: true

name: Pre-built realtime binaries
jobs:
  build_installer:
    name: Build CUDA Quantum Realtime installers
    runs-on: ${{ (contains(inputs.platform, 'arm') && 'linux-arm64-cpu32') || 'linux-amd64-cpu32' }}
    permissions:
      contents: read
      packages: read
    outputs:
      image_hash: ghcr.io/nvidia/cuda-quantum-realtime-assets-${{ inputs.platform }}-cu${{ inputs.cuda_version }}
      artifact_name: cuda-quantum-realtime-assets-${{ inputs.platform }}-cu${{ inputs.cuda_version }}
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: true

    - name: Log in to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_READONLY_TOKEN }}

    - name: Login to GitHub CR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}
    - name: Set up context for buildx
      run: |
        docker context create builder_context

    - name: Configure build
      id: config
      run: |
        is_versioned=${{ github.ref_type == 'tag' || startsWith(github.ref_name, 'releases/') || startsWith(github.ref_name, 'staging/') }}
        if ${is_versioned}; then
          cudaq_version=`echo ${{ github.ref_name }} | egrep -o "([0-9]{1,}\.)+[0-9]{1,}"`
        else
          cudaq_version=0.0.0
        fi
        echo "cudaq_version=$cudaq_version" >> $GITHUB_OUTPUT

    - name: Set up buildx runner
      uses: docker/setup-buildx-action@v3
      with:
        endpoint: builder_context
        version: v0.19.0
        buildkitd-config: /etc/buildkit/buildkitd.toml # hard-coded to run on our runners
        driver-opts: |
          network=host
          image=moby/buildkit:v0.19.0
    - name: Build assets
      id: docker_build
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./realtime/docker/assets.Dockerfile
        build-args: |
          base_image=${{ (contains(inputs.platform, 'arm') && 'ghcr.io/nvidia/arm64v8/almalinux:8') || 'ghcr.io/nvidia/amd64/almalinux:8' }}
          cuda_version=${{ inputs.cuda_version }}
          cuda_native_arg=${{ (contains(inputs.cuda_version, '12') && '80-real;90') || '80-real;90-real;100f-real;110-real;120-real;100-virtual' }}
          cudaq_version=${{ steps.config.outputs.cudaq_version }}
        tags: ghcr.io/nvidia/cuda-quantum-realtime-assets-${{ inputs.platform }}-cu${{ inputs.cuda_version }}
        # labels: ${{ steps.metadata.outputs.labels }}
        platforms: ${{ inputs.platform }}
        # TODO: set up cache
        # cache-from: |
        #   ${{ inputs.build_cache }}
        #   ${{ steps.config.outputs.additional_build_caches }}
        # TODO: push to the cache registry
        push: false
        # Output the installer
        outputs: type=local,dest=/tmp/install
    - name: Upload installer
      uses: actions/upload-artifact@v4
      with:
        name: install_cuda_quantum_realtime_cu${{ inputs.cuda_version }}.${{ inputs.platform }}
        path: /tmp/install
        retention-days: 1
        if-no-files-found: error

  validate_deb:
    name: Validate realtime deb
    needs: build_installer
    runs-on: ${{ (contains(inputs.platform, 'arm') && 'linux-arm64-cpu8') || 'linux-amd64-cpu8' }}
    permissions:
      contents: read

    strategy:
      matrix:
        # Realtime validation only checks install/uninstall mechanics --
        # libcudaq-realtime requires GPU + Holoscan/DOCA runtimes that
        # aren't available on the validation runners (validate_deb.sh -f
        # realtime skips the compile-and-run smoke test for that reason).
        target_image:
          - ubuntu:22.04
          - ubuntu:24.04
          - debian:12
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: install_cuda_quantum_realtime_cu${{ inputs.cuda_version }}.${{ inputs.platform }}
          path: /tmp/install

      - name: Validate realtime deb in ${{ matrix.target_image }}
        run: |
          set -e
          cuda_major=$(echo "${{ inputs.cuda_version }}" | cut -d . -f1)
          deb_arch=$([ "$(uname -m)" = "aarch64" ] && echo arm64 || echo amd64)

          deb_file=$(ls /tmp/install/cuda-quantum-realtime-cu${cuda_major}_*_${deb_arch}.deb 2>/dev/null | head -1)
          if [ -z "$deb_file" ]; then
            echo "::error::No realtime deb found for cu${cuda_major} ${deb_arch} in /tmp/install/"
            ls -la /tmp/install/ || true
            exit 1
          fi
          echo "Validating $deb_file in ${{ matrix.target_image }}"

          docker run --rm \
            -v /tmp/install:/install:ro \
            -v "$PWD/scripts/validate_deb.sh:/usr/local/bin/validate_deb.sh:ro" \
            ${{ matrix.target_image }} \
            bash -c "
              set -e
              export DEBIAN_FRONTEND=noninteractive
              apt-get update >/dev/null
              apt-get install -y --no-install-recommends $(basename $deb_file | sed 's,^,/install/,')
              bash /usr/local/bin/validate_deb.sh -c ${cuda_major} -f realtime
            "
