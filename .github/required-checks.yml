# Wrapped sub-workflows folded under the CI orchestrator. Each top-level
# wrapper job name (left side of the slash) is set in ci.yml; the right side
# is the inner reusable workflow's job name (or matrix-expanded job name).
# CodeQL is intentionally absent from this list — the `codeql` wrapper has
# `if: github.event_name != 'merge_group'` and so reports `skipped` here.
# Realtime is intentionally absent until names confirmed in a real run.
- Basic checks / Check code formatting
- Basic checks / Check license headers
- Basic checks / Check spelling
- Basic checks / Check links
- macOS / Retrieve PR info
- macOS / Load macOS dependencies
- macOS / Build & Test (arm64)
