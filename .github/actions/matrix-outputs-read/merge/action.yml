name: 'Matrix outputs - merge'
description: 'Internal helper for matrix-outputs-read; do not use directly'

inputs:
  matrix-step-name:
    required: true
    description: 'Matrix step name'
  download-path:
    required: true
    description: 'Directory the matrix output artifacts were downloaded to'

outputs:
  result:
    description: 'JSON map of output name to a map of matrix key to recorded value'

runs:
  using: 'node24'
  main: 'index.js'
