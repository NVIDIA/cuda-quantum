name: Bug report
description: Report a reproducible MKL-Q issue.
title: "[Bug]: "
labels: ["bug", "needs-repro"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an MKL-Q issue. Please include enough information to reproduce it locally.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What failed, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Commands, source snippet, target name, and relevant output.
      placeholder: |
        cudaq.set_target("mklq-cpu")
        ...
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      description: macOS version, Apple Silicon model, Python version, compiler version.
      placeholder: macOS 26.5.1, Apple M5, Python 3.12
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste the smallest relevant build, test, or runtime log.
      render: text
    validations:
      required: false
