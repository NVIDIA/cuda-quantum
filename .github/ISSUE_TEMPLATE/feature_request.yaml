name: Feature request
description: Suggest an MKL-Q improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What Apple Silicon or CUDA-Q-compatible workflow should this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the target behavior, API, or backend capability.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - mklq-cpu
        - mklq-metal
        - Python API
        - nvq++ / target config
        - Benchmarks
        - Documentation
    validations:
      required: true
