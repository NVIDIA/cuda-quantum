name: phase-folding-bench
description: "Phase folding optimization pass for compiler benchmarking/testing with minimum block length and Rz weight thresholds."

config:
  nvqir-simulation-backend: qpp
  # Phase folding pass (zero minimum block length and Rz weight thresholds)
  jit-mid-level-pipeline: "phase-folding-pipeline{min-length=0 min-rz-weight=0}"
  library-mode: false
